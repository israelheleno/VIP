<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Pass Tracker</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VIP Tracker">

    <style>
        :root { --bg: #000; --card-bg: #111; --gold: #d4af37; --text: #fff; --gray: #888; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.4; }
        .container { max-width: 480px; margin: auto; }
        h1 { text-align: center; color: var(--gold); font-size: 20px; margin-bottom: 20px; letter-spacing: 1px; }
        
        .admin-section { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px dashed #333; }
        select { background: #000; color: #fff; padding: 12px; border-radius: 8px; width: 100%; border: 1px solid var(--gold); font-size: 14px; outline: none; }

        .card { background: var(--card-bg); border-radius: 18px; padding: 18px; margin-bottom: 18px; border: 1px solid #222; position: relative; }
        .card-header { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 15px; }
        .card-img { width: 100px; height: 63px; object-fit: contain; border-radius: 6px; background: #050505; border: 1px solid #222; }
        .card-title { font-weight: bold; font-size: 16px; color: var(--gold); margin-top: 5px; }
        
        /* Bloco de Regras Detalhadas */
        .rules-block { background: #0a0a0a; border-radius: 10px; padding: 12px; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        .rule-item { display: flex; align-items: flex-start; gap: 8px; font-size: 11.5px; margin-bottom: 6px; color: #ccc; }
        .rule-item:last-child { margin-bottom: 0; }
        .rule-icon { color: var(--gold); font-size: 13px; width: 18px; text-align: center; }

        /* Contadores */
        .counter-section { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #222; }
        .usage-controls { display: flex; align-items: center; gap: 15px; }
        button.btn-step { background: #222; color: white; border: 1px solid #333; width: 38px; height: 38px; border-radius: 50%; font-size: 22px; cursor: pointer; }
        button.btn-step:active { background: var(--gold); color: black; }
        
        .stat { text-align: center; min-width: 55px; }
        .stat-val { display: block; font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; margin-top: 2px; }

        .btn-print { background: var(--gold); color: #000; border: none; padding: 16px; width: 100%; border-radius: 35px; font-weight: bold; margin-top: 25px; font-size: 14px; }
        .remove-icon { position: absolute; top: 12px; right: 12px; color: #333; font-size: 16px; cursor: pointer; }
        .footer { font-size: 10px; color: #444; text-align: center; margin-top: 40px; border-top: 1px solid #1a1a1a; padding: 25px 0 40px; }

        @media print {
            .admin-section, .btn-print, .btn-step, .remove-icon { display: none !important; }
            body { background: white !important; color: black !important; }
            .card { border: 1px solid #eee; background: #fff !important; }
            .rules-block { background: #f9f9f9 !important; border: 1px solid #eee !important; }
            .stat-val { color: black !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ VIP PASS TRACKER</h1>

    <div class="admin-section">
        <select id="cardSelector" onchange="addCard()">
            <option value="">+ Adicionar Cartão à Lista</option>
        </select>
    </div>

    <div id="displayArea"></div>

    <button class="btn-print" onclick="window.print()">📸 GERAR IMAGEM PARA ENVIO</button>

    <div class="footer">
        Base de Regras: Fevereiro de 2026.<br>
        Este app é uma ferramenta de auxílio pessoal.<br>
        Sempre confirme no app oficial do cartão antes de viajar.
    </div>
</div>

<script>
    const db = {
        // --- SEUS ---
        amex_tpc: { name: "Amex The Platinum (Brad)", img: "amex.png", total: "∞", rule: "Redes Bradesco e Centurion Lounges", adic: "Cada cartão adicional possui sua própria cota ilimitada.", cond: "Sem meta de gastos." },
        aa_black: { name: "Santander AAdvantage Black", img: "aa.png", total: 4, rule: "Acessos via LoungeKey", adic: "Cada cartão adicional possui sua própria cota de 4 acessos.", cond: "Manter média de gastos de R$ 1.000 nos últimos 3 meses." },
        itau_pers_black: { name: "Itaú Personnalité Black", img: "itau-black.png", total: 2, rule: "Acessos via LoungeKey", adic: "Cada cartão adicional possui sua própria cota de 2 acessos.", cond: "Sem meta de gastos." },
        xp_inf: { name: "XP Visa Infinite", img: "xp.png", total: 4, rule: "Acessos via Dragon Pass (VAC)", adic: "Acessos compartilhados entre titular e cartões adicionais.", cond: "Atingir gasto mínimo de R$ 3.000 na fatura fechada anterior." },
        c6_carbon: { name: "C6 Carbon Black", img: "c6.png", total: 4, rule: "Acessos via Dragon Pass", adic: "Acessos compartilhados entre titular e cartões adicionais.", cond: "Sem meta de gastos." },
        sofisa_inf: { name: "Sofisa Visa Infinite", img: "sofisa.png", total: 2, rule: "Acessos via Dragon Pass (VAC)", adic: "Acessos compartilhados entre titular e cartões adicionais.", cond: "Realizar qualquer gasto no cartão nos últimos 90 dias." },
        elo_nanquim: { name: "Elo Nanquim Caixa", img: "elo.png", total: 2, rule: "Acessos via Priority Pass", adic: "Cada adicional possui sua própria cota.", cond: "Sem meta de gastos (benefício fixo)." },

        // --- ULTRA ELITE ---
        amex_cent_brad: { name: "Bradesco Amex Centurion", img: "amex-centurion-bradesco.png", total: "∞", rule: "Acessos LoungeKey + Dragon Pass + Priority Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        amex_cent_sant: { name: "Santander Amex Centurion", img: "amex-centurion-santander.png", total: "∞", rule: "Acessos LoungeKey + Priority Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        bradesco_aet: { name: "Bradesco Aeternum Infinite", img: "bradesco-aeternum.png", total: "∞", rule: "Acessos LoungeKey + Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        bradesco_princ: { name: "Bradesco Principal Infinite", img: "bradesco-principal.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        btg_ultra: { name: "BTG Ultrablue Black", img: "btg-ultrablue.png", total: "∞", rule: "Acessos via LoungeKey", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        c6_graph: { name: "C6 Graphene Black", img: "c6-graphene.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        itau_priv_inf: { name: "Itaú Private Infinite", img: "itau-priv-inf.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        itau_priv_priv: { name: "Itaú Infinite Privilege", img: "itau-privilege.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        xp_priv_inf: { name: "XP Infinite Privilege", img: "xp-privilege.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        caixa_icone: { name: "Caixa Ícone Infinite", img: "caixa-icone.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        unicred_priv: { name: "Unicred Infinite Privilege", img: "unicred-privilege.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        unicred_imp: { name: "Unicred Ímpar Infinite", img: "unicred-impar.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        bb_altus: { name: "BB Altus Liv Infinite", img: "bb-altus-liv.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        brb_dux: { name: "BRB DUX Visa Infinite", img: "brb-dux.png", total: "∞", rule: "Acessos LK + DP + PP", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        banescard_abs: { name: "Banescard Absoluto", img: "banescard-absoluto.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        nomad_expl: { name: "Nomad Explorer", img: "nomad-explorer.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos individuais por conta ativa.", cond: "Sem meta de gastos." },
        itau_one: { name: "Itaú The One", img: "itau-the-one.png", total: "∞", rule: "Acessos via LoungeKey", adic: "Acessos individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        porto_inf: { name: "Porto Bank Infinite", img: "porto-inf.png", total: 10, rule: "Acessos via Dragon Pass", adic: "Cada cartão adicional possui sua própria cota de 10 acessos.", cond: "Sem meta de gastos." },
        porto_black: { name: "Porto Bank Black", img: "porto-black.png", total: 10, rule: "Acessos via LoungeKey", adic: "Cada cartão adicional possui sua própria cota de 10 acessos.", cond: "Sem meta de gastos." },
        sicredi_black: { name: "Sicredi Black", img: "sicredi-black.png", total: "∞", rule: "Acessos via LoungeKey", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        unicred_inf: { name: "Unicred Infinite", img: "unicred-inf.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        azul_inf: { name: "Azul Infinite", img: "azul-inf.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        latam_inf: { name: "LATAM Pass Infinite", img: "latam-inf.png", total: "∞", rule: "Acessos via Dragon Pass", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        caixa_inf: { name: "Caixa Infinite", img: "caixa-inf.png", total: 2, rule: "Acessos via Dragon Pass", adic: "Acessos individuais por cartão.", cond: "Sem meta de gastos." },
        inter_win: { name: "Inter Win (Wealth)", img: "inter-win.png", total: "∞", rule: "Acessos via LoungeKey", adic: "Acessos ilimitados e individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        inter_black: { name: "Inter Black", img: "inter-black.png", total: "∞", rule: "Acessos via LoungeKey", adic: "Acessos individuais por cartão.", cond: "Sem meta de gastos." }
    };

    let userCards = JSON.parse(localStorage.getItem('vip_userCards')) || [];
    let usage = JSON.parse(localStorage.getItem('vip_usage')) || {};

    function init() {
        const sel = document.getElementById('cardSelector');
        Object.keys(db).sort((a,b) => db[a].name.localeCompare(db[b].name)).forEach(key => {
            let opt = document.createElement('option');
            opt.value = key; opt.innerText = db[key].name;
            sel.appendChild(opt);
        });
        render();
    }

    function addCard() {
        const id = document.getElementById('cardSelector').value;
        if (id && !userCards.includes(id)) {
            userCards.push(id);
            if (usage[id] === undefined) usage[id] = 0;
            save(); render();
        }
        document.getElementById('cardSelector').value = "";
    }

    function removeCard(id) {
        if(confirm("Remover cartão da sua lista?")) {
            userCards = userCards.filter(c => c !== id);
            save(); render();
        }
    }

    function step(id, val) {
        usage[id] = Math.max(0, (usage[id] || 0) + val);
        save(); render();
    }

    function save() {
        localStorage.setItem('vip_userCards', JSON.stringify(userCards));
        localStorage.setItem('vip_usage', JSON.stringify(usage));
    }

    function render() {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        userCards.forEach(id => {
            const c = db[id];
            const used = usage[id] || 0;
            const remains = c.total === "∞" ? "∞" : Math.max(0, c.total - used);
            area.innerHTML += `
                <div class="card">
                    <span class="remove-icon" onclick="removeCard('${id}')">✕</span>
                    <div class="card-header">
                        <img src="${c.img}" class="card-img" onerror="this.src='https://via.placeholder.com/100x63/111/d4af37?text=CARD'">
                        <div class="card-title">${c.name}</div>
                    </div>
                    
                    <div class="rules-block">
                        <div class="rule-item"><span class="rule-icon">🌐</span><span>${c.rule}</span></div>
                        <div class="rule-item"><span class="rule-icon">👥</span><span><strong>Adicionais:</strong> ${c.adic}</span></div>
                        <div class="rule-item"><span class="rule-icon">💰</span><span><strong>Condição:</strong> ${c.cond}</span></div>
                    </div>

                    <div class="counter-section">
                        <div class="stat"><span class="stat-val" style="color:#555">${c.total}</span><span class="stat-label">Total</span></div>
                        <div class="usage-controls">
                            <button class="btn-step" onclick="step('${id}', -1)">-</button>
                            <div class="stat"><span class="stat-val">${used}</span><span class="stat-label">Usados</span></div>
                            <button class="btn-step" onclick="step('${id}', 1)">+</button>
                        </div>
                        <div class="stat"><span class="stat-val" style="color:${remains == 0 && c.total !== '∞' ? '#ff4444' : '#00ff88'}">${remains}</span><span class="stat-label">Saldo</span></div>
                    </div>
                </div>`;
        });
    }
    init();
</script>
</body>
</html>
