<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Pass Tracker</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VIP Tracker">

    <style>
        :root { --bg: #000; --card-bg: #111; --gold: #d4af37; --text: #fff; --sub: #888; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 480px; margin: auto; }
        h1 { text-align: center; color: var(--gold); font-size: 18px; margin-bottom: 20px; text-transform: uppercase; }
        
        .admin-section { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #333; }
        select { background: #000; color: #fff; padding: 12px; border-radius: 8px; width: 100%; border: 1px solid var(--gold); }

        .card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; position: relative; }
        .card-header { display: flex; gap: 15px; align-items: center; margin-bottom: 12px; }
        .card-img-box { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .card-img { width: 90px; height: 56px; object-fit: contain; border-radius: 6px; background: #000; border: 1px solid #222; }
        
        /* Selo do Programa - AGORA EM BRANCO */
        .program-badge { background: #222; color: #fff; font-size: 9px; padding: 4px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; border: 0.5px solid #444; }

        /* Título do Cartão - AGORA EM DOURADO */
        .card-title { font-weight: bold; font-size: 15px; color: var(--gold); flex: 1; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .cond-box { background: #1a1505; border-left: 3px solid var(--gold); padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .cond-text { font-size: 12px; color: #eee; display: flex; gap: 8px; }
        
        .adic-box { padding: 0 10px; margin-bottom: 15px; }
        .adic-text { font-size: 11px; color: #888; display: flex; gap: 8px; }

        .counter-section { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #222; }
        .usage-controls { display: flex; align-items: center; gap: 15px; }
        button.btn-step { background: #333; color: white; border: none; width: 38px; height: 38px; border-radius: 50%; font-size: 22px; cursor: pointer; }
        button.btn-step:active { background: var(--gold); color: black; }
        
        .stat { text-align: center; }
        .stat-val { display: block; font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; }

        .btn-print { background: var(--gold); color: #000; border: none; padding: 16px; width: 100%; border-radius: 35px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .remove-icon { position: absolute; top: 12px; right: 15px; color: #333; font-size: 16px; }

        @media print {
            .admin-section, .btn-print, .btn-step, .remove-icon { display: none !important; }
            body { background: white !important; color: black !important; }
            .card { border: 1px solid #ddd; }
            .card-title { color: black !important; }
            .program-badge { color: black !important; border: 1px solid #ccc !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✈️ VIP Pass Tracker</h1>

    <div class="admin-section">
        <select id="cardSelector" onchange="addCard()">
            <option value="">+ Adicionar Cartão...</option>
        </select>
    </div>

    <div id="displayArea"></div>

    <button class="btn-print" onclick="window.print()">📸 GERAR PRINT PARA ENVIO</button>
</div>

<script>
    const db = {
        amex_tpc: { name: "Amex The Platinum (Brad)", img: "amex.png", total: "∞", prog: "Bradesco & Centurion", adic: "Cada cartão adicional possui sua própria cota ilimitada.", cond: "Sem meta de gastos." },
        aa_black: { name: "Santander AAdvantage Black", img: "aa.png", total: 4, prog: "LoungeKey", adic: "Cada cartão adicional possui sua própria cota de 4 acessos.", cond: "Manter média de gastos de R$ 1.000 nos últimos 3 meses." },
        itau_pers_black: { name: "Itaú Personnalité Black", img: "itau-black.png", total: 2, prog: "LoungeKey", adic: "Cada adicional possui sua própria cota de 2 acessos.", cond: "Sem meta de gastos." },
        xp_inf: { name: "XP Visa Infinite", img: "xp.png", total: 4, prog: "Visa Airport Companion", adic: "Acessos compartilhados entre titular e cartões adicionais.", cond: "Atingir gasto mínimo de R$ 3.000 na fatura fechada anterior." },
        c6_carbon: { name: "C6 Carbon Black", img: "c6.png", total: 4, prog: "Dragon Pass", adic: "Acessos compartilhados entre titular e adicionais.", cond: "Sem meta de gastos." },
        sofisa_inf: { name: "Sofisa Visa Infinite", img: "sofisa.png", total: 2, prog: "Visa Airport Companion", adic: "Acessos compartilhados entre titular e adicionais.", cond: "Realizar qualquer gasto no cartão nos últimos 90 dias." },
        brb_dux: { name: "BRB DUX Visa Infinite", img: "brb-dux.png", total: "∞", prog: "LK + Dragon Pass + PP", adic: "Acessos ilimitados para titular e até 8 adicionais.", cond: "Sem meta de gastos." },
        amex_cent_brad: { name: "Bradesco Amex Centurion", img: "amex-centurion-bradesco.png", total: "∞", prog: "LK + Dragon Pass + PP", adic: "Acessos ilimitados e individuais para todos os cartões.", cond: "Sem meta de gastos." },
        porto_inf: { name: "Porto Bank Infinite", img: "porto-inf.png", total: 10, prog: "Visa Airport Companion", adic: "Cada adicional possui sua própria cota de 10 acessos.", cond: "Sem meta de gastos." },
        caixa_icone: { name: "Caixa Ícone Infinite", img: "caixa-icone.png", total: "∞", prog: "Visa Airport Companion", adic: "Acessos ilimitados e individuais por cartão.", cond: "Sem meta de gastos." },
        itau_the_one: { name: "Itaú The One", img: "itau-the-one.png", total: "∞", prog: "LoungeKey", adic: "Acessos individuais para titular e adicionais.", cond: "Sem meta de gastos." },
        bradesco_aet: { name: "Bradesco Aeternum", img: "bradesco-aeternum.png", total: "∞", prog: "LoungeKey + Dragon Pass", adic: "Acessos ilimitados para titular e adicionais.", cond: "Sem meta de gastos." }
    };

    let userCards = JSON.parse(localStorage.getItem('vip_userCards')) || [];
    let usage = JSON.parse(localStorage.getItem('vip_usage')) || {};

    function init() {
        const sel = document.getElementById('cardSelector');
        Object.keys(db).sort((a,b) => db[a].name.localeCompare(db[b].name)).forEach(key => {
            let opt = document.createElement('option');
            opt.value = key; opt.innerText = db[key].name;
            sel.appendChild(opt);
        });
        render();
    }

    function addCard() {
        const id = document.getElementById('cardSelector').value;
        if (id && !userCards.includes(id)) {
            userCards.push(id);
            if (usage[id] === undefined) usage[id] = 0;
            save(); render();
        }
        document.getElementById('cardSelector').value = "";
    }

    function removeCard(id) {
        if(confirm("Remover cartão?")) {
            userCards = userCards.filter(c => c !== id);
            save(); render();
        }
    }

    function step(id, val) {
        usage[id] = Math.max(0, (usage[id] || 0) + val);
        save(); render();
    }

    function save() {
        localStorage.setItem('vip_userCards', JSON.stringify(userCards));
        localStorage.setItem('vip_usage', JSON.stringify(usage));
    }

    function render() {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        userCards.forEach(id => {
            const c = db[id];
            const used = usage[id] || 0;
            const remains = c.total === "∞" ? "∞" : Math.max(0, c.total - used);
            area.innerHTML += `
                <div class="card">
                    <span class="remove-icon" onclick="removeCard('${id}')">✕</span>
                    <div class="card-header">
                        <div class="card-img-box">
                            <img src="${c.img}" class="card-img" onerror="this.src='https://via.placeholder.com/90x56/111/d4af37?text=CARD'">
                            <div class="program-badge">${c.prog}</div>
                        </div>
                        <div class="card-title">${c.name}</div>
                    </div>
                    
                    <div class="cond-box">
                        <div class="cond-text">
                            <span>💰</span>
                            <span><strong>Condição de Uso:</strong> ${c.cond}</span>
                        </div>
                    </div>

                    <div class="adic-box">
                        <div class="adic-text">
                            <span>👥</span>
                            <span><strong>Adicionais:</strong> ${c.adic}</span>
                        </div>
                    </div>

                    <div class="counter-section">
                        <div class="stat"><span class="stat-val" style="color:#444">${c.total}</span><span class="stat-label">Total</span></div>
                        <div class="usage-controls">
                            <button class="btn-step" onclick="step('${id}', -1)">-</button>
                            <div class="stat"><span class="stat-val">${used}</span><span class="stat-label">Usados</span></div>
                            <button class="btn-step" onclick="step('${id}', 1)">+</button>
                        </div>
                        <div class="stat"><span class="stat-val" style="color:${remains == 0 && c.total !== '∞' ? '#ff4444' : '#00ff88'}">${remains}</span><span class="stat-label">Saldo</span></div>
                    </div>
                </div>`;
        });
    }
    init();
</script>
</body>
</html>
